  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F4EDE0" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('numeri.theme');
          if (t === 'midnight') {
            document.documentElement.setAttribute('data-theme', 'midnight');
            var m = document.querySelector('meta[name="theme-color"]');
            if (m) m.setAttribute('content', '#011627');
          }
        } catch (_) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

  </head>
