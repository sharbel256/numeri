<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .bg { fill: #1a1a1a; }
    .fg { fill: #F4EDE0; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #F4EDE0; }
      .fg { fill: #1a1a1a; }
    }
  </style>
  <rect class="bg" width="32" height="32" rx="6" />
  <text
    class="fg"
    x="50%"
    y="50%"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Fraunces, 'Times New Roman', Georgia, serif"
    font-style="italic"
    font-weight="700"
    font-size="26"
  >n</text>
</svg>
